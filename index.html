<!DOCTYPE html>
<!-- x-vibepoastry — X content engine UI with compose, feed, schedule, and assets tabs -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>x-vibepoastry</title>
  <style>
    /* ── theme tokens ─────────────────────── */
    :root {
      --bg-page:   #f7f9f9;
      --bg-card:   #ffffff;
      --bg-sidebar: #ffffff;
      --border:    #eff3f4;
      --border-2:  #cfd9de;
      --text:      #0f1419;
      --text-2:    #536471;
      --text-3:    #8899a6;
      --hover:     #f7f9f9;
      --ring-bg:   #cfd9de;
      --accent:    #1d9bf0;
      --accent-hover: #1a8cd8;
      --danger:    #f4212e;
      --success:   #00ba7c;
      --warning:   #ffd400;
      --thumb-remove-bg: rgba(0,0,0,0.75);
      --thumb-remove-color: #fff;
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg-page:   #000000;
        --bg-card:   #000000;
        --bg-sidebar: #000000;
        --border:    #2f3336;
        --border-2:  #2f3336;
        --text:      #e7e9ea;
        --text-2:    #71767b;
        --text-3:    #536471;
        --hover:     #080808;
        --ring-bg:   #2f3336;
        --thumb-remove-bg: rgba(0,0,0,0.75);
        --thumb-remove-color: #e7e9ea;
      }
    }

    :root[data-theme="dark"] {
      --bg-page:   #000000;
      --bg-card:   #000000;
      --bg-sidebar: #000000;
      --border:    #2f3336;
      --border-2:  #2f3336;
      --text:      #e7e9ea;
      --text-2:    #71767b;
      --text-3:    #536471;
      --hover:     #080808;
      --ring-bg:   #2f3336;
      --thumb-remove-bg: rgba(0,0,0,0.75);
      --thumb-remove-color: #e7e9ea;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-page);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── sidebar ──────────────────────────── */
    .sidebar {
      width: 72px;
      min-width: 72px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
      gap: 4px;
      height: 100vh;
    }

    .sidebar-logo {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 20px;
      color: var(--text);
    }

    .sidebar-tab {
      width: 52px;
      height: 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      border: none;
      background: none;
      color: var(--text-2);
      cursor: pointer;
      border-radius: 12px;
      transition: background .15s, color .15s;
      font-size: 10px;
      font-weight: 600;
      font-family: inherit;
    }

    .sidebar-tab:hover { background: var(--hover); color: var(--text); }
    .sidebar-tab.active { color: var(--accent); background: rgba(29,155,240,0.1); }
    .sidebar-tab svg { width: 22px; height: 22px; fill: currentColor; }

    .sidebar-bottom {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding-bottom: 8px;
    }

    .sidebar-handle {
      font-size: 11px;
      color: var(--text-2);
      font-weight: 600;
    }

    .vps-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-3);
      transition: background .3s;
    }
    .vps-dot.ok { background: var(--success); }
    .vps-dot.err { background: var(--danger); }

    .theme-toggle {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-2);
      font-size: 16px;
      padding: 4px;
      border-radius: 50%;
    }
    .theme-toggle:hover { background: var(--hover); }

    /* ── main content area ────────────────── */
    .main {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow-y: auto;
      padding: 20px;
    }

    .tab-content {
      display: none;
      width: 100%;
      max-width: 598px;
    }
    .tab-content.active { display: block; }

    /* ── compose tab ──────────────────────── */
    .compose-wrap {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .compose-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      font-size: 15px;
      font-weight: 700;
    }

    /* thread cards */
    .tweet-card {
      display: flex;
      gap: 12px;
      padding: 14px 16px 0;
    }

    .card-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      width: 40px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 16px;
      color: white;
      flex-shrink: 0;
      user-select: none;
    }

    .thread-line {
      width: 2px;
      flex: 1;
      min-height: 16px;
      background: var(--ring-bg);
      margin-top: 4px;
      border-radius: 1px;
    }

    .tweet-card:last-child .thread-line { display: none; }

    .card-right {
      flex: 1;
      min-width: 0;
      padding-bottom: 12px;
    }

    .audience-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      padding: 3px 10px 3px 8px;
      border: 1px solid rgba(29,155,240,0.2);
      border-radius: 20px;
      margin-bottom: 10px;
      cursor: default;
    }
    .tweet-card:not(:first-child) .audience-pill { display: none; }

    textarea {
      width: 100%;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 20px;
      font-family: inherit;
      resize: none;
      line-height: 1.5;
      min-height: 60px;
    }
    textarea::placeholder { color: var(--text-3); }

    .image-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 8px;
    }

    .img-thumb {
      position: relative;
      width: 120px;
      height: 90px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }

    .img-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .img-thumb .img-remove {
      position: absolute;
      top: 4px;
      right: 4px;
      background: var(--thumb-remove-bg);
      border: none;
      color: var(--thumb-remove-color);
      border-radius: 50%;
      width: 22px;
      height: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      line-height: 1;
    }
    .img-thumb .img-remove:hover { background: rgba(244,33,46,0.85); }

    .card-toolbar {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 8px;
    }

    .img-attach-btn {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      padding: 6px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
    }
    .img-attach-btn:hover { background: rgba(29,155,240,0.1); }
    .img-attach-btn svg { width: 18px; height: 18px; fill: currentColor; }

    .char-ring {
      margin-left: auto;
      position: relative;
      width: 24px;
      height: 24px;
    }
    .char-ring svg { transform: rotate(-90deg); display: block; }
    .ring-track { fill: none; stroke: var(--ring-bg); stroke-width: 2.5; }
    .ring-fill  { fill: none; stroke: var(--accent); stroke-width: 2.5; stroke-linecap: round;
                  transition: stroke-dashoffset .08s, stroke .08s; }

    .ring-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      color: var(--text-2);
      pointer-events: none;
    }
    .ring-label.warn { color: var(--warning); }
    .ring-label.over { color: var(--danger); }

    .remove-card-btn {
      background: none;
      border: none;
      color: var(--text-2);
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      font-size: 18px;
      line-height: 1;
      transition: color .15s;
    }
    .remove-card-btn:hover { color: var(--danger); }

    .add-thread-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px 14px;
    }

    .add-thread-avatar { width: 40px; display: flex; justify-content: center; }

    .mini-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.6;
    }

    .add-thread-btn {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      padding: 4px 0;
      opacity: 0.7;
      transition: opacity .15s;
    }
    .add-thread-btn:hover { opacity: 1; }

    /* compose bottom toolbar */
    .compose-toolbar {
      border-top: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .compose-toolbar .spacer { flex: 1; }

    .btn {
      border: none;
      padding: 9px 20px;
      border-radius: 20px;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s, opacity .15s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }

    .btn-outline {
      background: none;
      border: 1px solid var(--border-2);
      color: var(--text);
    }
    .btn-outline:hover:not(:disabled) { border-color: var(--text); }

    .btn-ghost {
      background: none;
      border: none;
      color: var(--accent);
      padding: 9px 12px;
    }
    .btn-ghost:hover { background: rgba(29,155,240,0.1); }

    .btn-danger {
      background: none;
      border: none;
      color: var(--danger);
      padding: 6px 8px;
      font-size: 13px;
    }
    .btn-danger:hover { background: rgba(244,33,46,0.1); }

    /* ── draft list ───────────────────────── */
    .draft-list {
      margin-top: 16px;
    }

    .draft-list-header {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .draft-item {
      padding: 14px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background .15s;
      position: relative;
    }
    .draft-item:hover { background: var(--hover); }

    .draft-status {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 6px;
    }
    .draft-status.draft { background: rgba(29,155,240,0.15); color: var(--accent); }
    .draft-status.posted { background: rgba(0,186,124,0.15); color: var(--success); }
    .draft-status.scheduled { background: rgba(255,212,0,0.15); color: #b58900; }

    .draft-body {
      color: var(--text);
      font-size: 14px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .draft-meta { color: var(--text-2); font-size: 12px; margin-top: 6px; }

    .draft-actions {
      display: flex;
      gap: 4px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .draft-actions .btn { font-size: 12px; padding: 5px 12px; font-weight: 600; }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-2);
      font-size: 15px;
    }

    /* ── feed tab ─────────────────────────── */
    .feed-header {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 16px;
    }

    .stats-bar {
      display: flex;
      gap: 20px;
      padding: 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .stat-value { font-size: 20px; font-weight: 800; }
    .stat-label { font-size: 12px; color: var(--text-2); font-weight: 500; }

    .tweet-item {
      padding: 14px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 8px;
    }

    .tweet-text {
      font-size: 15px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 8px;
    }

    .tweet-metrics {
      display: flex;
      gap: 16px;
      color: var(--text-2);
      font-size: 13px;
    }

    .tweet-metrics span { display: flex; align-items: center; gap: 4px; }
    .tweet-date { font-size: 12px; color: var(--text-3); margin-top: 6px; }

    /* ── schedule tab ─────────────────────── */
    .queue-item {
      padding: 14px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 8px;
    }

    .queue-status {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 6px;
    }
    .queue-status.pending { background: rgba(255,212,0,0.15); color: #b58900; }
    .queue-status.posted { background: rgba(0,186,124,0.15); color: var(--success); }
    .queue-status.failed { background: rgba(244,33,46,0.15); color: var(--danger); }
    .queue-status.cancelled { background: rgba(83,100,113,0.15); color: var(--text-2); }

    .queue-time { font-size: 13px; color: var(--text-2); margin-bottom: 4px; }
    .queue-countdown { font-size: 12px; color: var(--accent); font-weight: 600; }

    /* ── assets tab ───────────────────────── */
    .asset-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .asset-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: border-color .15s;
    }
    .asset-card:hover { border-color: var(--accent); }

    .asset-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
    }

    .asset-card .asset-info {
      padding: 8px 10px;
      font-size: 12px;
      color: var(--text-2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .asset-card .asset-del {
      position: absolute;
      top: 6px;
      right: 6px;
      background: var(--thumb-remove-bg);
      border: none;
      color: var(--thumb-remove-color);
      border-radius: 50%;
      width: 24px;
      height: 24px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .asset-card:hover .asset-del { display: flex; }
    .asset-card .asset-del:hover { background: rgba(244,33,46,0.85); }

    .text-asset {
      padding: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 8px;
      position: relative;
    }

    .text-asset-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .text-asset-body {
      font-size: 14px;
      color: var(--text-2);
      white-space: pre-wrap;
      line-height: 1.4;
    }

    /* ── schedule modal ───────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 24px;
      width: 400px;
      max-width: 90vw;
    }

    .modal h3 {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 16px;
    }

    .modal input[type="datetime-local"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border-2);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      background: var(--bg-page);
      color: var(--text);
      margin-bottom: 16px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    /* ── toast ────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--accent);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      transition: transform .25s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 999;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.err  { background: var(--danger); }
  </style>
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar">
  <div class="sidebar-logo">xvp</div>

  <button class="sidebar-tab active" data-tab="compose" onclick="switchTab('compose')" title="Compose">
    <svg viewBox="0 0 24 24"><path d="M23 3c-6.62-.1-10.38 2.421-13.05 6.03C7.29 12.61 6 17.331 6 22h2c0-1.007.07-2.012.19-3H12c4.1 0 7.48-3.082 7.94-7.054C22.79 8.496 23.684 5.333 23 3zM12 17H8.55c.57-2.512 1.57-4.851 3-6.78 2.16-2.912 5.29-4.911 9.45-5.187C20.94 8.36 19.9 11 17 13c-1.5 1-3 2-5 4z"/></svg>
    <span>Compose</span>
  </button>

  <button class="sidebar-tab" data-tab="feed" onclick="switchTab('feed')" title="My Feed">
    <svg viewBox="0 0 24 24"><path d="M5.651 19h12.698c-.337-1.8-1.023-3.21-1.945-4.19C15.318 13.65 13.838 13 12 13s-3.317.65-4.404 1.81c-.922.98-1.608 2.39-1.945 4.19zm.486-5.56C7.627 11.85 9.648 11 12 11s4.373.85 5.863 2.44c1.477 1.58 2.366 3.8 2.632 6.46l.11 1.1H3.395l.11-1.1c.266-2.66 1.155-4.88 2.632-6.46zM12 4c-1.105 0-2 .9-2 2s.895 2 2 2 2-.9 2-2-.895-2-2-2zM8 6c0-2.21 1.791-4 4-4s4 1.79 4 4-1.791 4-4 4-4-1.79-4-4z"/></svg>
    <span>Feed</span>
  </button>

  <button class="sidebar-tab" data-tab="schedule" onclick="switchTab('schedule')" title="Schedule">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.486 2 2 6.486 2 12s4.486 10 10 10 10-4.486 10-10S17.514 2 12 2zm0 18c-4.411 0-8-3.589-8-8s3.589-8 8-8 8 3.589 8 8-3.589 8-8 8zm1-8.414V7h-2v5.414l3.293 3.293 1.414-1.414L13 11.586z"/></svg>
    <span>Schedule</span>
  </button>

  <button class="sidebar-tab" data-tab="assets" onclick="switchTab('assets')" title="Assets">
    <svg viewBox="0 0 24 24"><path d="M3 5.5C3 4.119 4.119 3 5.5 3h13C19.881 3 21 4.119 21 5.5v13c0 1.381-1.119 2.5-2.5 2.5h-13C4.119 21 3 19.881 3 18.5v-13zM5.5 5c-.276 0-.5.224-.5.5v9.086l3-3 3 3 5-5 3 3V5.5c0-.276-.224-.5-.5-.5h-13zM19 15.414l-3-3-5 5-3-3-3 3V18.5c0 .276.224.5.5.5h13c.276 0 .5-.224.5-.5v-3.086zM9.75 7C8.784 7 8 7.784 8 8.75s.784 1.75 1.75 1.75 1.75-.784 1.75-1.75S10.716 7 9.75 7z"/></svg>
    <span>Assets</span>
  </button>

  <div class="sidebar-bottom">
    <div class="vps-dot" id="vpsDot" title="VPS status"></div>
    <span class="sidebar-handle" id="sidebarHandle">@_welf</span>
    <button class="theme-toggle" id="themeBtn" onclick="cycleTheme()" title="Toggle theme"></button>
  </div>
</nav>

<!-- Main content -->
<div class="main">

  <!-- ── COMPOSE TAB ──────────────────────── -->
  <div class="tab-content active" id="tab-compose">
    <div class="compose-wrap">
      <div class="compose-header">New post</div>

      <div id="threadContainer"></div>

      <div class="add-thread-row">
        <div class="add-thread-avatar"><div class="mini-avatar"></div></div>
        <button class="add-thread-btn" onclick="addCard()">Add to thread</button>
      </div>

      <!-- Validation result bar -->
      <div id="validateBar" style="display:none; padding:10px 16px; border-top:1px solid var(--border); font-size:13px; line-height:1.5;"></div>

      <div class="compose-toolbar">
        <button class="btn btn-ghost" onclick="saveDraftFromComposer()">Save draft</button>
        <div class="spacer"></div>
        <button class="btn btn-outline" id="validateBtn" onclick="validateDraft()" disabled style="font-size:13px; padding:6px 14px; border-color:var(--accent); color:var(--accent);">Stress Test</button>
        <button class="btn btn-outline" id="scheduleBtn" onclick="openScheduleModal()" disabled>Schedule</button>
        <button class="btn btn-outline" id="jamBtn" onclick="jamCurrentDraft()" disabled>Jam</button>
        <button class="btn btn-primary" id="postBtn" onclick="handlePost()" disabled>Post</button>
      </div>
    </div>

    <!-- Draft list below composer -->
    <div class="draft-list" id="draftList">
      <div class="draft-list-header">Drafts</div>
      <div id="draftListItems"></div>
    </div>
  </div>

  <!-- ── FEED TAB ─────────────────────────── -->
  <div class="tab-content" id="tab-feed">
    <div class="feed-header">My Feed</div>
    <div class="stats-bar" id="statsBar">
      <div class="stat-item"><span class="stat-value" id="statFollowers">—</span><span class="stat-label">Followers</span></div>
      <div class="stat-item"><span class="stat-value" id="statTweets">—</span><span class="stat-label">Tweets</span></div>
      <div class="stat-item"><span class="stat-value" id="statLikes">—</span><span class="stat-label">Recent Likes</span></div>
      <div class="stat-item"><span class="stat-value" id="statImpressions">—</span><span class="stat-label">Recent Impressions</span></div>
    </div>
    <div id="feedList"></div>
  </div>

  <!-- ── SCHEDULE TAB ─────────────────────── -->
  <div class="tab-content" id="tab-schedule">
    <div class="feed-header">Scheduled Posts</div>
    <div id="queueList"></div>
  </div>

  <!-- ── ASSETS TAB ───────────────────────── -->
  <div class="tab-content" id="tab-assets">
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:16px;">
      <span class="feed-header" style="margin:0">Assets</span>
      <button class="btn btn-outline" onclick="triggerAssetUpload()" style="font-size:13px; padding:6px 14px;">Upload Image</button>
      <button class="btn btn-outline" onclick="promptNewNote()" style="font-size:13px; padding:6px 14px;">Add Note</button>
      <input type="file" id="assetFileInput" accept="image/*" multiple hidden onchange="handleAssetUpload(this)">
    </div>
    <div id="imageAssets" class="asset-grid"></div>
    <div id="textAssets" style="margin-top:16px;"></div>
  </div>

</div>

<!-- Schedule modal -->
<div class="modal-overlay" id="scheduleModal">
  <div class="modal">
    <h3>Schedule Post</h3>
    <input type="datetime-local" id="scheduleTime">
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeScheduleModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmSchedule()">Schedule</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'http://localhost:3131';
  const MAX = 280;
  const CIRC = 2 * Math.PI * 9;
  let cardSeq = 0;
  const cardImages = new Map();
  let currentEditDraftId = null;

  // ── theme ──────────────────────────────────────────────

  function applyTheme(t) {
    if (t) document.documentElement.setAttribute('data-theme', t);
    else   document.documentElement.removeAttribute('data-theme');
    updateThemeIcon(t);
  }

  function updateThemeIcon(t) {
    const eff = t || (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
    document.getElementById('themeBtn').textContent = eff === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19';
  }

  function cycleTheme() {
    const cur = localStorage.getItem('xvp-theme');
    const sys = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
    const next = cur ? null : (sys === 'dark' ? 'light' : 'dark');
    if (next) localStorage.setItem('xvp-theme', next);
    else localStorage.removeItem('xvp-theme');
    applyTheme(next);
  }

  applyTheme(localStorage.getItem('xvp-theme'));
  matchMedia('(prefers-color-scheme:dark)').addEventListener('change', () => {
    if (!localStorage.getItem('xvp-theme')) updateThemeIcon(null);
  });

  // ── tabs ───────────────────────────────────────────────

  function switchTab(name) {
    document.querySelectorAll('.sidebar-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
    document.querySelectorAll('.tab-content').forEach(el => el.classList.toggle('active', el.id === `tab-${name}`));
    if (name === 'feed') loadFeed();
    if (name === 'schedule') loadQueue();
    if (name === 'assets') loadAssets();
  }

  // ── VPS status check ──────────────────────────────────

  async function checkVPS() {
    const dot = document.getElementById('vpsDot');
    try {
      const r = await fetch(`${API}/status`);
      const d = await r.json();
      dot.className = d.ok ? 'vps-dot ok' : 'vps-dot err';
      dot.title = d.ok ? `Connected: @${d.username}` : (d.error || 'Error');
    } catch {
      dot.className = 'vps-dot err';
      dot.title = 'VPS unreachable';
    }
  }

  // ── card management ────────────────────────────────────

  function addCard(text = '') {
    const id = ++cardSeq;
    cardImages.set(id, []);

    const card = document.createElement('div');
    card.className = 'tweet-card';
    card.dataset.id = id;
    card.innerHTML = `
      <div class="card-left">
        <div class="avatar">W</div>
        <div class="thread-line"></div>
      </div>
      <div class="card-right">
        <div class="audience-pill">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
          Everyone
        </div>
        <textarea placeholder="What is happening?!" oninput="onInput(${id})" rows="3">${esc(text)}</textarea>
        <div class="image-strip" id="strip-${id}"></div>
        <div class="card-toolbar">
          <button class="img-attach-btn" onclick="triggerFileInput(${id})" title="Attach images">
            <svg viewBox="0 0 24 24"><path d="M3 5.5C3 4.119 4.119 3 5.5 3h13C19.881 3 21 4.119 21 5.5v13c0 1.381-1.119 2.5-2.5 2.5h-13C4.119 21 3 19.881 3 18.5v-13zM5.5 5c-.276 0-.5.224-.5.5v9.086l3-3 3 3 5-5 3 3V5.5c0-.276-.224-.5-.5-.5h-13zM19 15.414l-3-3-5 5-3-3-3 3V18.5c0 .276.224.5.5.5h13c.276 0 .5-.224.5-.5v-3.086zM9.75 7C8.784 7 8 7.784 8 8.75s.784 1.75 1.75 1.75 1.75-.784 1.75-1.75S10.716 7 9.75 7z"/></svg>
          </button>
          <input type="file" id="file-${id}" accept="image/*" multiple hidden onchange="onFilesChosen(${id}, this)">
          <div class="char-ring" id="ring-${id}">
            <svg width="24" height="24" viewBox="0 0 24 24">
              <circle class="ring-track" cx="12" cy="12" r="9"/>
              <circle class="ring-fill" cx="12" cy="12" r="9" id="ringFill-${id}" stroke-dasharray="${CIRC.toFixed(2)}" stroke-dashoffset="${CIRC.toFixed(2)}"/>
            </svg>
            <div class="ring-label" id="ringLabel-${id}"></div>
          </div>
          <button class="remove-card-btn" onclick="removeCard(${id})" title="Remove tweet">\u00d7</button>
        </div>
      </div>
    `;

    document.getElementById('threadContainer').appendChild(card);
    updateRemoveButtons();

    const ta = card.querySelector('textarea');
    ta.addEventListener('input', () => autoResize(ta));
    autoResize(ta);
    setTimeout(() => ta.focus(), 0);
    onInput(id);
    return id;
  }

  function removeCard(id) {
    const cards = document.querySelectorAll('.tweet-card');
    if (cards.length <= 1) return;
    document.querySelector(`.tweet-card[data-id="${id}"]`)?.remove();
    cardImages.delete(id);
    updateRemoveButtons();
    updateButtons();
  }

  function updateRemoveButtons() {
    const cards = document.querySelectorAll('.tweet-card');
    cards.forEach(c => {
      c.querySelector('.remove-card-btn').style.display = cards.length > 1 ? '' : 'none';
    });
  }

  function autoResize(ta) {
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
  }

  // ── char counter ───────────────────────────────────────

  function onInput(id) {
    const ta = document.querySelector(`.tweet-card[data-id="${id}"] textarea`);
    if (!ta) return;
    const len = ta.value.length;
    const left = MAX - len;
    const pct = Math.min(len / MAX, 1.1);

    const fill = document.getElementById(`ringFill-${id}`);
    const label = document.getElementById(`ringLabel-${id}`);

    fill.style.strokeDashoffset = CIRC - pct * CIRC;

    if (len === 0) {
      fill.style.stroke = '#2f3336'; label.textContent = ''; label.className = 'ring-label';
    } else if (left > 20) {
      fill.style.stroke = 'var(--accent)'; label.textContent = ''; label.className = 'ring-label';
    } else if (left >= 0) {
      fill.style.stroke = 'var(--warning)'; label.textContent = left; label.className = 'ring-label warn';
    } else {
      fill.style.stroke = 'var(--danger)'; label.textContent = left; label.className = 'ring-label over';
    }

    updateButtons();
  }

  function updateButtons() {
    const cards = document.querySelectorAll('.tweet-card');
    let canPost = false, anyOver = false;

    cards.forEach(c => {
      const id = +c.dataset.id;
      const ta = c.querySelector('textarea');
      const len = ta.value.length;
      const imgs = cardImages.get(id) || [];
      if (len > 0 || imgs.length > 0) canPost = true;
      if (len > MAX) anyOver = true;
    });

    const ok = canPost && !anyOver;
    document.getElementById('postBtn').disabled = !ok;
    document.getElementById('scheduleBtn').disabled = !ok;
    document.getElementById('jamBtn').disabled = !ok;
    document.getElementById('validateBtn').disabled = !ok;
  }

  // ── image handling ─────────────────────────────────────

  function triggerFileInput(id) {
    if ((cardImages.get(id) || []).length >= 4) { toast('Max 4 images per tweet', true); return; }
    document.getElementById(`file-${id}`).click();
  }

  function onFilesChosen(id, input) {
    const existing = cardImages.get(id) || [];
    const slots = 4 - existing.length;
    const files = Array.from(input.files).slice(0, slots);

    Promise.all(files.map(file => new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => resolve({
        data: e.target.result.split(',')[1],
        mimeType: file.type,
        name: file.name,
        preview: e.target.result,
      });
      reader.readAsDataURL(file);
    }))).then(newImgs => {
      cardImages.set(id, [...existing, ...newImgs]);
      renderImageStrip(id);
      updateButtons();
    });

    input.value = '';
  }

  function removeImage(cardId, imgIdx) {
    const imgs = cardImages.get(cardId) || [];
    imgs.splice(imgIdx, 1);
    cardImages.set(cardId, imgs);
    renderImageStrip(cardId);
    updateButtons();
  }

  function renderImageStrip(cardId) {
    const strip = document.getElementById(`strip-${cardId}`);
    if (!strip) return;
    const imgs = cardImages.get(cardId) || [];
    strip.innerHTML = imgs.map((img, i) => `
      <div class="img-thumb">
        <img src="${img.preview}" alt="${esc(img.name)}">
        <button class="img-remove" onclick="removeImage(${cardId},${i})" title="Remove">\u00d7</button>
      </div>
    `).join('');
  }

  // ── collect thread data ────────────────────────────────

  function collectThread() {
    return Array.from(document.querySelectorAll('.tweet-card')).map(c => {
      const id = +c.dataset.id;
      const text = c.querySelector('textarea').value.trim();
      const imgs = (cardImages.get(id) || []).map(({data, mimeType, name, preview}) => ({data, mimeType, name, preview}));
      return { text, media: imgs };
    }).filter(t => t.text || t.media.length);
  }

  function clearComposer() {
    document.getElementById('threadContainer').innerHTML = '';
    cardImages.clear();
    cardSeq = 0;
    currentEditDraftId = null;
    addCard();
  }

  // ── post handler ───────────────────────────────────────

  // ── stress test (cringe/tone validator) ─────────────

  async function validateDraft() {
    const thread = collectThread();
    if (!thread.length) return;

    const btn = document.getElementById('validateBtn');
    const bar = document.getElementById('validateBar');
    btn.disabled = true;
    btn.textContent = 'Testing\u2026';
    bar.style.display = 'block';
    bar.innerHTML = '<span style="color:var(--text-2)">Running stress test\u2026</span>';

    try {
      const res = await fetch(`${API}/validate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tweets: thread.map(t => ({ text: t.text })) }),
      });
      const data = await res.json();

      if (!data.ok && data.error) {
        bar.innerHTML = `<span style="color:var(--warning)">Validator offline: ${esc(data.error)}</span>`;
        return;
      }

      const s = data.scores || {};
      const avg = data.average || 0;
      const verdict = data.verdict || 'UNKNOWN';

      const verdictColors = { SHIP: 'var(--success)', REWORK: 'var(--warning)', KILL: 'var(--danger)', UNKNOWN: 'var(--text-2)' };
      const verdictColor = verdictColors[verdict] || 'var(--text-2)';

      let html = `<div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">`;
      html += `<span style="font-weight:800; color:${verdictColor}; font-size:15px;">${verdict}</span>`;
      html += `<span style="color:var(--text-2)">avg ${avg.toFixed?.(1) ?? avg}/10</span>`;

      // Score pills
      const dims = [
        ['cringe', s.cringe], ['warmth', s.warmth], ['preachy', s.preachiness],
        ['hook', s.hook], ['authentic', s.authenticity]
      ];
      for (const [label, score] of dims) {
        if (score == null) continue;
        const color = score >= 8 ? 'var(--success)' : score >= 5 ? 'var(--warning)' : 'var(--danger)';
        html += `<span style="background:${color}22; color:${color}; padding:2px 8px; border-radius:10px; font-weight:600; font-size:12px;">${label} ${score}</span>`;
      }
      html += `</div>`;

      // Flags
      if (data.flags?.length) {
        html += `<div style="margin-top:6px; color:var(--danger); font-size:12px;">`;
        html += data.flags.map(f => `\u26a0 ${esc(f)}`).join('<br>');
        html += `</div>`;
      }

      // Suggestion
      if (data.suggestion && verdict === 'REWORK') {
        html += `<div style="margin-top:6px; color:var(--accent); font-size:12px;">\u2192 ${esc(data.suggestion)}</div>`;
      }

      bar.innerHTML = html;
    } catch (e) {
      bar.innerHTML = `<span style="color:var(--danger)">Error: ${esc(e.message)}</span>`;
    } finally {
      btn.textContent = 'Stress Test';
      updateButtons();
    }
  }

  // ── post handler ───────────────────────────────────────

  async function handlePost() {
    const thread = collectThread();
    if (!thread.length) return;

    const btn = document.getElementById('postBtn');
    btn.disabled = true;
    btn.textContent = 'Posting\u2026';

    try {
      const payload = {
        tweets: thread.map(t => ({
          text: t.text,
          media: t.media.filter(m => m.data),
        })),
      };
      if (currentEditDraftId) payload.draft_id = currentEditDraftId;

      const res = await fetch(`${API}/post`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

      clearComposer();
      loadDrafts();
      toast(`Posted! \u2192 ${data.url}`);
    } catch (e) {
      toast('Error: ' + e.message, true);
    } finally {
      btn.textContent = 'Post';
      updateButtons();
    }
  }

  // ── draft management ───────────────────────────────────

  async function saveDraftFromComposer() {
    const thread = collectThread();
    if (!thread.length) { toast('Nothing to save', true); return; }

    try {
      if (currentEditDraftId) {
        await fetch(`${API}/drafts/${currentEditDraftId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ thread: thread.map(t => ({ text: t.text })) }),
        });
        toast('Draft updated');
      } else {
        const res = await fetch(`${API}/drafts`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ thread: thread.map(t => ({ text: t.text })) }),
        });
        const data = await res.json();
        currentEditDraftId = data.id;
        toast('Draft saved');
      }
      loadDrafts();
    } catch (e) {
      toast('Error: ' + e.message, true);
    }
  }

  async function loadDrafts() {
    try {
      const res = await fetch(`${API}/drafts`);
      const data = await res.json();
      renderDraftList(data.drafts || []);
    } catch {
      document.getElementById('draftListItems').innerHTML = '<div class="empty-state">Could not load drafts</div>';
    }
  }

  function renderDraftList(drafts) {
    const el = document.getElementById('draftListItems');
    if (!drafts.length) {
      el.innerHTML = '<div class="empty-state">No drafts yet</div>';
      return;
    }

    el.innerHTML = drafts.map(d => {
      const thread = d.thread || [];
      const preview = thread[0]?.text || '(empty)';
      const isThread = thread.length > 1;
      const statusClass = d.status || 'draft';

      return `
        <div class="draft-item">
          <span class="draft-status ${statusClass}">${statusClass}${isThread ? ` \u00b7 ${thread.length} tweets` : ''}</span>
          <div class="draft-body">${esc(preview.slice(0, 200))}${preview.length > 200 ? '\u2026' : ''}</div>
          <div class="draft-meta">${d.created_at || ''}</div>
          <div class="draft-actions">
            <button class="btn btn-outline" onclick="editDraft('${d.id}')">Edit</button>
            <button class="btn btn-ghost" onclick="jamDraft('${d.id}')">Jam</button>
            <button class="btn btn-outline" onclick="scheduleDraft('${d.id}')">Schedule</button>
            <button class="btn btn-primary" onclick="postDraft('${d.id}')" style="font-size:12px;padding:5px 12px;">Post</button>
            <button class="btn btn-danger" onclick="deleteDraft('${d.id}')">Delete</button>
          </div>
        </div>
      `;
    }).join('');
  }

  async function editDraft(id) {
    try {
      const res = await fetch(`${API}/drafts/${id}`);
      const draft = await res.json();
      const thread = draft.thread || [];

      document.getElementById('threadContainer').innerHTML = '';
      cardImages.clear();
      cardSeq = 0;
      currentEditDraftId = id;

      thread.forEach(t => addCard(t.text || ''));
      updateButtons();
    } catch (e) {
      toast('Error loading draft: ' + e.message, true);
    }
  }

  async function deleteDraft(id) {
    try {
      await fetch(`${API}/drafts/${id}`, { method: 'DELETE' });
      if (currentEditDraftId === id) clearComposer();
      loadDrafts();
      toast('Draft deleted');
    } catch (e) {
      toast('Error: ' + e.message, true);
    }
  }

  async function postDraft(id) {
    try {
      const res = await fetch(`${API}/post`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ draft_id: id }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      loadDrafts();
      if (currentEditDraftId === id) clearComposer();
      toast(`Posted! \u2192 ${data.url}`);
    } catch (e) {
      toast('Error: ' + e.message, true);
    }
  }

  async function jamDraft(id) {
    try {
      const res = await fetch(`${API}/drafts/${id}/jam`, { method: 'POST' });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      toast('Jam ready \u2014 run /cc-x-jam in CC');
    } catch (e) {
      toast('Error: ' + e.message, true);
    }
  }

  async function jamCurrentDraft() {
    const thread = collectThread();
    if (!thread.length) return;

    // Save as draft first if needed
    if (!currentEditDraftId) {
      const res = await fetch(`${API}/drafts`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ thread: thread.map(t => ({ text: t.text })) }),
      });
      const data = await res.json();
      currentEditDraftId = data.id;
    }

    jamDraft(currentEditDraftId);
  }

  // ── schedule ───────────────────────────────────────────

  let scheduleDraftId = null;

  function openScheduleModal(draftId) {
    scheduleDraftId = draftId || null;
    // Default to 1 hour from now
    const d = new Date(Date.now() + 3600000);
    document.getElementById('scheduleTime').value = d.toISOString().slice(0, 16);
    document.getElementById('scheduleModal').classList.add('open');
  }

  function closeScheduleModal() {
    document.getElementById('scheduleModal').classList.remove('open');
    scheduleDraftId = null;
  }

  function scheduleDraft(id) {
    scheduleDraftId = id;
    openScheduleModal(id);
  }

  async function confirmSchedule() {
    const timeInput = document.getElementById('scheduleTime').value;
    if (!timeInput) { toast('Pick a time', true); return; }

    const scheduledAt = new Date(timeInput).toISOString();
    let tweets;

    if (scheduleDraftId) {
      const res = await fetch(`${API}/drafts/${scheduleDraftId}`);
      const draft = await res.json();
      tweets = (draft.thread || []).map(t => ({ text: t.text }));
    } else {
      tweets = collectThread().map(t => ({ text: t.text }));
    }

    try {
      const res = await fetch(`${API}/schedule`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          tweets,
          scheduled_at: scheduledAt,
          draft_id: scheduleDraftId || currentEditDraftId,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || data.detail);

      closeScheduleModal();
      loadDrafts();
      toast('Scheduled!');
    } catch (e) {
      toast('Error: ' + e.message, true);
    }
  }

  // ── feed tab ───────────────────────────────────────────

  async function loadFeed() {
    // Load stats
    try {
      const res = await fetch(`${API}/stats`);
      const data = await res.json();
      document.getElementById('statFollowers').textContent = fmtNum(data.followers);
      document.getElementById('statTweets').textContent = fmtNum(data.tweet_count);
      document.getElementById('statLikes').textContent = fmtNum(data.recent_metrics?.total_likes || 0);
      document.getElementById('statImpressions').textContent = fmtNum(data.recent_metrics?.total_impressions || 0);
    } catch {}

    // Load tweets
    try {
      const res = await fetch(`${API}/tweets?count=20`);
      const data = await res.json();
      const el = document.getElementById('feedList');

      if (!data.tweets?.length) {
        el.innerHTML = '<div class="empty-state">No tweets found</div>';
        return;
      }

      el.innerHTML = data.tweets.map(t => `
        <div class="tweet-item">
          <div class="tweet-text">${esc(t.text)}</div>
          <div class="tweet-metrics">
            <span>\u2764\uFE0F ${fmtNum(t.metrics.likes)}</span>
            <span>\uD83D\uDD01 ${fmtNum(t.metrics.retweets)}</span>
            <span>\uD83D\uDCAC ${fmtNum(t.metrics.replies)}</span>
            <span>\uD83D\uDC41 ${fmtNum(t.metrics.impressions)}</span>
          </div>
          <div class="tweet-date">${fmtDate(t.created_at)}</div>
        </div>
      `).join('');
    } catch (e) {
      document.getElementById('feedList').innerHTML = `<div class="empty-state">Could not load feed: ${e.message}</div>`;
    }
  }

  // ── schedule tab ───────────────────────────────────────

  async function loadQueue() {
    try {
      const res = await fetch(`${API}/queue`);
      const data = await res.json();
      const el = document.getElementById('queueList');

      if (!data.items?.length) {
        el.innerHTML = '<div class="empty-state">No scheduled posts</div>';
        return;
      }

      el.innerHTML = data.items.map(item => {
        const tweets = JSON.parse(item.tweets_json || '[]');
        const preview = tweets[0]?.text || '(empty)';
        const countdown = item.status === 'pending' ? getCountdown(item.scheduled_at) : '';

        return `
          <div class="queue-item">
            <span class="queue-status ${item.status}">${item.status}</span>
            ${countdown ? `<span class="queue-countdown">${countdown}</span>` : ''}
            <div class="queue-time">Scheduled: ${fmtDate(item.scheduled_at)}</div>
            <div class="draft-body">${esc(preview.slice(0, 200))}</div>
            ${item.tweet_url ? `<div class="draft-meta"><a href="${item.tweet_url}" target="_blank">${item.tweet_url}</a></div>` : ''}
            ${item.error ? `<div class="draft-meta" style="color:var(--danger)">Error: ${esc(item.error)}</div>` : ''}
            ${item.status === 'pending' ? `<div class="draft-actions"><button class="btn btn-danger" onclick="cancelScheduled('${item.id}')">Cancel</button></div>` : ''}
          </div>
        `;
      }).join('');
    } catch (e) {
      document.getElementById('queueList').innerHTML = `<div class="empty-state">Could not load queue: ${e.message}</div>`;
    }
  }

  async function cancelScheduled(id) {
    try {
      await fetch(`${API}/queue/${id}`, { method: 'DELETE' });
      loadQueue();
      toast('Cancelled');
    } catch (e) {
      toast('Error: ' + e.message, true);
    }
  }

  // ── assets tab ─────────────────────────────────────────

  async function loadAssets() {
    try {
      const res = await fetch(`${API}/assets`);
      const data = await res.json();
      const assets = data.assets || [];

      const images = assets.filter(a => a.type === 'image');
      const texts = assets.filter(a => a.type !== 'image');

      const imgEl = document.getElementById('imageAssets');
      if (images.length) {
        imgEl.innerHTML = images.map(a => {
          const src = a.file_path ? `${API}/media/assets/${a.file_path.split('/').pop()}` : '';
          return `
            <div class="asset-card">
              <img src="${src}" alt="${esc(a.title || '')}">
              <div class="asset-info">${esc(a.title || 'Untitled')}</div>
              <button class="asset-del" onclick="deleteAsset('${a.id}')" title="Delete">\u00d7</button>
            </div>
          `;
        }).join('');
      } else {
        imgEl.innerHTML = '';
      }

      const txtEl = document.getElementById('textAssets');
      if (texts.length) {
        txtEl.innerHTML = texts.map(a => `
          <div class="text-asset">
            ${a.title ? `<div class="text-asset-title">${esc(a.title)}</div>` : ''}
            <div class="text-asset-body">${esc(a.content || '')}</div>
            <button class="asset-del" style="display:flex;top:8px;right:8px;" onclick="deleteAsset('${a.id}')" title="Delete">\u00d7</button>
          </div>
        `).join('');
      } else {
        txtEl.innerHTML = '';
      }

      if (!images.length && !texts.length) {
        imgEl.innerHTML = '<div class="empty-state">No assets yet</div>';
      }
    } catch (e) {
      document.getElementById('imageAssets').innerHTML = `<div class="empty-state">Could not load assets: ${e.message}</div>`;
    }
  }

  function triggerAssetUpload() {
    document.getElementById('assetFileInput').click();
  }

  async function handleAssetUpload(input) {
    for (const file of input.files) {
      const formData = new FormData();
      formData.append('file', file);
      try {
        await fetch(`${API}/assets`, { method: 'POST', body: formData });
      } catch (e) {
        toast('Upload error: ' + e.message, true);
      }
    }
    input.value = '';
    loadAssets();
    toast('Uploaded');
  }

  function promptNewNote() {
    const title = prompt('Note title (optional):');
    if (title === null) return;
    const content = prompt('Note content:');
    if (!content) return;

    fetch(`${API}/assets`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'text', title, content }),
    }).then(() => {
      loadAssets();
      toast('Note saved');
    }).catch(e => toast('Error: ' + e.message, true));
  }

  async function deleteAsset(id) {
    try {
      await fetch(`${API}/assets/${id}`, { method: 'DELETE' });
      loadAssets();
      toast('Deleted');
    } catch (e) {
      toast('Error: ' + e.message, true);
    }
  }

  // ── helpers ────────────────────────────────────────────

  function esc(t) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(t || ''));
    return d.innerHTML;
  }

  function fmtNum(n) {
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
    return String(n);
  }

  function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' +
           d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  }

  function getCountdown(iso) {
    const diff = new Date(iso) - Date.now();
    if (diff <= 0) return 'now';
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    if (h > 0) return `in ${h}h ${m}m`;
    return `in ${m}m`;
  }

  let _toastTimer;
  function toast(msg, err = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast' + (err ? ' err' : '') + ' show';
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), 3400);
  }

  // ── keyboard shortcuts ─────────────────────────────────

  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault();
      if (!document.getElementById('postBtn').disabled) handlePost();
    }
    if ((e.metaKey || e.ctrlKey) && e.key === 's') {
      e.preventDefault();
      saveDraftFromComposer();
    }
  });

  // ── init ───────────────────────────────────────────────

  addCard();
  checkVPS();
  loadDrafts();
  setInterval(checkVPS, 30000);
</script>

</body>
</html>
